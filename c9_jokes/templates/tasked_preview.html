{% extends "base.html" %}
{% block title %}Tasked Preview{% endblock %}
{% block content %}
<style>
.tp-shell{display:grid;gap:1rem;max-width:1100px}
.tp-hero{background:var(--card,rgba(255,255,255,0.04));border:1px solid var(--border,rgba(255,255,255,0.08));border-radius:16px;padding:1rem 1.2rem;display:grid;gap:.55rem}
.tp-hero-row{display:flex;align-items:flex-start;gap:.75rem;flex-wrap:wrap}
.tp-hero h1{margin:0;font-size:1.2rem;flex:1;min-width:180px}
.tp-hero-meta{font-size:.83rem;color:var(--muted);line-height:1.55;display:flex;gap:1rem;flex-wrap:wrap}
.tp-type-pill{display:inline-flex;align-items:center;gap:.3rem;border:1px solid var(--border,#333);border-radius:999px;padding:.22rem .65rem;font-size:.73rem;color:var(--muted);background:#111;white-space:nowrap}
.tp-run-bar{display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.tp-run-bar label{font-size:.83rem;color:var(--muted)}
.tp-run-bar select{background:#111;border:1px solid var(--border,#333);border-radius:8px;color:var(--fg,#f5f5f7);padding:.35rem .6rem;font:inherit;font-size:.83rem}
.tp-card{background:var(--card,rgba(255,255,255,0.04));border:1px solid var(--border,rgba(255,255,255,0.08));border-radius:14px;padding:.9rem 1rem}
.tp-card h2{margin:0 0 .65rem 0;font-size:.95rem;display:flex;align-items:center;gap:.5rem}
.tp-output{white-space:pre-wrap;word-break:break-word;background:#111;border:1px solid var(--border,#333);border-radius:12px;padding:.85rem;min-height:90px;font-size:.83rem;font-family:monospace;line-height:1.55;color:var(--fg,#f5f5f7)}
.tp-empty{color:var(--muted);font-size:.83rem;font-style:italic}
.tp-steps{display:grid;gap:.6rem}
.tp-step{background:#111;border:1px solid var(--border,#333);border-radius:12px;padding:.75rem .85rem;display:grid;gap:.35rem}
.tp-step-head{display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap}
.tp-step-name{font-size:.87rem;font-weight:600}
.tp-step-meta{display:flex;gap:.55rem;align-items:center;font-size:.77rem;color:var(--muted)}
.tp-step-output{white-space:pre-wrap;word-break:break-word;font-size:.77rem;font-family:monospace;color:var(--muted);background:#0d0d0d;border-radius:8px;padding:.5rem .65rem;max-height:160px;overflow:auto;margin-top:.25rem}
.tp-alerts{display:grid;gap:.55rem}
.tp-alert{display:grid;gap:.25rem;background:#111;border:1px solid var(--border,#333);border-radius:12px;padding:.7rem .85rem}
.tp-alert-head{display:flex;align-items:center;gap:.5rem;font-size:.87rem;font-weight:600}
.tp-alert-body{font-size:.8rem;color:var(--muted)}
.tp-actions{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.tp-stat{font-size:.78rem;color:var(--muted)}
.tp-loading{color:var(--muted);font-size:.85rem;padding:1.5rem 0;text-align:center}
.sev-info{color:#0a84ff}.sev-warn{color:#ffa000}.sev-error{color:#ff453a}.sev-ok{color:#30d158}
</style>

<div class="tp-shell" id="tp-root">
  <div class="tp-loading" id="tp-loading">Loading preview…</div>

  <!-- hero header -->
  <div class="tp-hero" id="tp-hero" style="display:none">
    <div class="tp-hero-row">
      <h1 id="tp-task-name">—</h1>
      <span class="tp-type-pill" id="tp-type-pill"></span>
    </div>
    <div id="tp-task-desc" class="tp-stat"></div>
    <div class="tp-hero-meta">
      <span id="tp-mode-label"></span>
      <span id="tp-run-status"></span>
      <span id="tp-run-time"></span>
    </div>
    <!-- run selector -->
    <div class="tp-run-bar" id="tp-run-bar" style="display:none">
      <label for="tp-run-sel">Run:</label>
      <select id="tp-run-sel"></select>
      <span class="tp-stat" id="tp-run-count"></span>
    </div>
  </div>

  <!-- compiled output -->
  <div class="tp-card" id="tp-output-card" style="display:none">
    <h2>Output</h2>
    <pre class="tp-output" id="tp-output-text"></pre>
  </div>

  <!-- step results -->
  <div class="tp-card" id="tp-steps-card" style="display:none">
    <h2>Step Results <span class="tp-stat" id="tp-step-count"></span></h2>
    <div class="tp-steps" id="tp-steps-list"></div>
  </div>

  <!-- alerts -->
  <div class="tp-card" id="tp-alerts-card" style="display:none">
    <h2>Alerts <span class="tp-stat" id="tp-alert-count"></span></h2>
    <div class="tp-alerts" id="tp-alerts-list"></div>
  </div>

  <!-- actions -->
  <div class="tp-actions" id="tp-actions" style="display:none">
    <a id="tp-link-tasked" href="#" class="tasked-btn secondary" style="text-decoration:none;display:inline-flex;align-items:center;gap:.35rem;">Open in Tasked →</a>
    <button id="tp-run-btn" class="tasked-btn">▶ Run Now</button>
    <span class="tp-stat" id="tp-run-msg"></span>
  </div>

  <div id="tp-error" style="display:none;color:var(--fail,#ff453a);font-size:.85rem;padding:.5rem 0"></div>
</div>

<script>
(function () {
  const TASKED_TYPE_OPTIONS = {{ tasked_type_options | safe }};

  function qs(id) { return document.getElementById(id); }
  function show(id) { const el = qs(id); if (el) el.style.display = ''; }
  function hide(id) { const el = qs(id); if (el) el.style.display = 'none'; }
  function text(id, val) { const el = qs(id); if (el) el.textContent = val; }

  const params = new URLSearchParams(location.search);
  let taskId = params.get('task_id') || '';
  let runId  = params.get('run_id')  || '';

  function statusClass(s) {
    if (!s) return '';
    s = s.toLowerCase();
    if (s === 'completed') return 'completed';
    if (s === 'failed' || s === 'error') return 'failed';
    if (s === 'running') return 'running';
    return '';
  }

  function sevClass(sev) {
    const m = { info: 'sev-info', warn: 'sev-warn', warning: 'sev-warn', error: 'sev-error', ok: 'sev-ok' };
    return m[(sev || '').toLowerCase()] || 'sev-info';
  }

  function fmtDate(s) {
    if (!s) return '';
    try { return new Date(s).toLocaleString(); } catch { return s; }
  }

  function fmtMs(ms) {
    if (ms == null || ms === '') return '';
    const n = Number(ms);
    if (isNaN(n)) return '';
    if (n < 1000) return n + 'ms';
    return (n / 1000).toFixed(1) + 's';
  }

  function typeLabel(tid) {
    const opt = TASKED_TYPE_OPTIONS.find(o => o.id === tid);
    return opt ? opt.label : (tid || 'Output');
  }

  function renderPreview(data) {
    const task = data.task || {};
    const run  = data.run  || null;
    const steps = data.step_results || [];
    const alerts = data.alerts || [];
    const outputText = data.output_text || '';
    const recentRuns = data.recent_runs || [];

    // hero
    text('tp-task-name', task.name || '(Unnamed task)');
    const pill = qs('tp-type-pill');
    if (pill) pill.textContent = typeLabel(task.tasked_type);
    const desc = qs('tp-task-desc');
    if (desc) desc.textContent = task.description || '';

    const modeEl = qs('tp-mode-label');
    if (modeEl) modeEl.textContent = task.mode_label ? 'Mode: ' + task.mode_label : '';

    if (run) {
      const sc = statusClass(run.status);
      text('tp-run-status', 'Status: ' + (run.status || '—'));
      qs('tp-run-status').className = 'tasked-status ' + sc;
      text('tp-run-time', run.created_at ? fmtDate(run.created_at) : '');
    }

    // run selector
    if (recentRuns.length > 1) {
      const sel = qs('tp-run-sel');
      sel.innerHTML = recentRuns.map(r => {
        const label = fmtDate(r.created_at) + ' — ' + (r.status || '?') + (r.source ? ' (' + r.source + ')' : '');
        const selected = r.id === (run ? run.id : '') ? ' selected' : '';
        return '<option value="' + r.id + '"' + selected + '>' + label + '</option>';
      }).join('');
      sel.addEventListener('change', function () {
        runId = this.value;
        const url = new URL(location.href);
        url.searchParams.set('task_id', taskId);
        url.searchParams.set('run_id', runId);
        history.replaceState(null, '', url.toString());
        load();
      });
      text('tp-run-count', recentRuns.length + ' runs');
      show('tp-run-bar');
    }

    show('tp-hero');

    // output
    const outEl = qs('tp-output-text');
    if (outEl) outEl.textContent = outputText;
    show('tp-output-card');

    // steps
    const stepsList = qs('tp-steps-list');
    if (stepsList && steps.length) {
      text('tp-step-count', '(' + steps.length + ')');
      stepsList.innerHTML = steps.map(function (s) {
        const sc = statusClass(s.status);
        const dur = fmtMs(s.duration_ms);
        let outputSnippet = '';
        if (s.output && typeof s.output === 'object') {
          const keys = Object.keys(s.output).filter(k => s.output[k] != null && s.output[k] !== '');
          if (keys.length) {
            const preview = {};
            keys.slice(0, 4).forEach(k => {
              const v = s.output[k];
              preview[k] = typeof v === 'string' && v.length > 120 ? v.slice(0, 120) + '…' : v;
            });
            outputSnippet = JSON.stringify(preview, null, 2);
          }
        }
        return '<div class="tp-step">' +
          '<div class="tp-step-head">' +
            '<span class="tp-step-name">' + (s.step_name || s.step_id || 'Step') + '</span>' +
            '<div class="tp-step-meta">' +
              (s.step_kind ? '<span class="tp-type-pill">' + s.step_kind + '</span>' : '') +
              '<span class="tasked-status ' + sc + '">' + (s.status || '—') + '</span>' +
              (dur ? '<span>' + dur + '</span>' : '') +
            '</div>' +
          '</div>' +
          (outputSnippet ? '<pre class="tp-step-output">' + outputSnippet + '</pre>' : '') +
        '</div>';
      }).join('');
      show('tp-steps-card');
    }

    // alerts
    const alertsList = qs('tp-alerts-list');
    if (alertsList && alerts.length) {
      text('tp-alert-count', '(' + alerts.length + ')');
      alertsList.innerHTML = alerts.map(function (a) {
        const sc = sevClass(a.severity);
        return '<div class="tp-alert">' +
          '<div class="tp-alert-head"><span class="' + sc + '">' + (a.severity || 'info').toUpperCase() + '</span> ' + (a.title || '') + '</div>' +
          (a.summary ? '<div class="tp-alert-body">' + a.summary + '</div>' : '') +
        '</div>';
      }).join('');
      show('tp-alerts-card');
    }

    // actions
    const taskedLink = qs('tp-link-tasked');
    if (taskedLink && taskId) taskedLink.href = '/tasked?task_id=' + encodeURIComponent(taskId);
    const runBtn = qs('tp-run-btn');
    if (runBtn) {
      runBtn.addEventListener('click', function () {
        runBtn.disabled = true;
        text('tp-run-msg', 'Triggering run…');
        fetch('/api/task/' + encodeURIComponent(taskId) + '/run', { method: 'POST' })
          .then(r => r.json())
          .then(function (d) {
            if (d.ok || d.run_id) {
              text('tp-run-msg', 'Run started: ' + (d.run_id || ''));
              setTimeout(load, 2000);
            } else {
              text('tp-run-msg', 'Error: ' + (d.error || 'unknown'));
              runBtn.disabled = false;
            }
          })
          .catch(function () {
            text('tp-run-msg', 'Request failed');
            runBtn.disabled = false;
          });
      });
    }
    show('tp-actions');
  }

  function load() {
    hide('tp-hero');
    hide('tp-output-card');
    hide('tp-steps-card');
    hide('tp-alerts-card');
    hide('tp-actions');
    hide('tp-error');
    show('tp-loading');

    if (!taskId) {
      hide('tp-loading');
      const errEl = qs('tp-error');
      if (errEl) { errEl.textContent = 'No task_id in URL. Open via /tasked-preview?task_id=<id>'; errEl.style.display = ''; }
      return;
    }

    let url = '/api/task-preview?task_id=' + encodeURIComponent(taskId);
    if (runId) url += '&run_id=' + encodeURIComponent(runId);

    fetch(url)
      .then(r => r.json())
      .then(function (data) {
        hide('tp-loading');
        if (!data.ok) {
          const errEl = qs('tp-error');
          if (errEl) { errEl.textContent = data.error || 'Failed to load preview'; errEl.style.display = ''; }
          return;
        }
        renderPreview(data);
      })
      .catch(function (e) {
        hide('tp-loading');
        const errEl = qs('tp-error');
        if (errEl) { errEl.textContent = 'Fetch error: ' + e.message; errEl.style.display = ''; }
      });
  }

  load();
})();
</script>
{% endblock %}
