<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}C9 Jokes{% endblock %} — Stack validation</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}"/>
</head>
<body>
  <header>
    <h1>C9_JOKES — validation console</h1>
    <nav>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('page_health') }}">Health</a>
      <a href="{{ url_for('page_pairs') }}">Pairs</a>
      <a href="{{ url_for('page_chat') }}">Chat</a>
      <a href="{{ url_for('page_logs') }}">Logs</a>
      <a href="{{ url_for('page_sessions') }}">Sessions</a>
      <a href="{{ url_for('page_api_reference') }}">API</a>
    </nav>
    <div id="session-led" class="session-led checking" title="M365 browser session status">
      <span class="session-led-dot"></span>
      <span class="session-led-label">Checking…</span>
    </div>
  </header>
  <script>
  (function() {
    function updateLed(data) {
      var led = document.getElementById('session-led');
      if (!led) return;
      var dot = led.querySelector('.session-led-dot');
      var lbl = led.querySelector('.session-led-label');
      led.className = 'session-led ' + (data.session || 'unknown');
      if (data.session === 'active') {
        var modeStr = data.chat_mode ? ' | ' + data.chat_mode.charAt(0).toUpperCase() + data.chat_mode.slice(1) : '';
        lbl.textContent = 'M365 Session: Active' + modeStr;
        led.title = 'Session active — profile: ' + (data.profile || '') + (data.chat_mode ? ' — mode: ' + data.chat_mode : '');
      } else if (data.session === 'expired') {
        lbl.textContent = 'M365 Session: Expired — sign in via noVNC :6080';
        led.title = 'Session expired: ' + (data.reason || '') + ' — Sign in via noVNC at port 6080';
      } else {
        lbl.textContent = 'M365 Session: Unknown';
        led.title = 'Could not reach C3: ' + (data.reason || '');
      }
    }
    function pollSession() {
      fetch('/api/session-health')
        .then(function(r) { return r.json(); })
        .then(function(d) { updateLed(d); })
        .catch(function() { updateLed({session: 'unknown', reason: 'network error'}); });
    }
    pollSession();
    setInterval(pollSession, 30000);
  })();
  </script>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Read-only observer — does not modify C1–C8 configuration or cookies.</footer>
</body>
</html>
