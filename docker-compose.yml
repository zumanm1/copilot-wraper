# ============================================================
# Copilot OpenAI-Compatible API Wrapper — Docker Compose
#
# Two-container architecture:
#
#   Container 1 (app)            — FastAPI OpenAI-compatible API
#                                  Wraps Microsoft Copilot via WebSocket
#                                  Exposes: http://localhost:8000
#
#   Container 2 (agent-terminal) — Interactive AI Agent Terminal
#                                  Runs Aider / OpenCode
#                                  Uses Container 1 for inference
#
# ── Quick start ───────────────────────────────────────────────
#
#   # 1. Start the API server (Container 1):
#   docker compose up app -d
#
#   # 2. Launch an interactive AI agent session (Container 2):
#   docker compose run --rm agent-terminal
#
#   # 3. Run automated Playwright tests:
#   docker compose run --rm test
#
#   # 4. Stop everything:
#   docker compose down
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # Container 1: FastAPI Copilot API Wrapper
  #
  # OpenAI-compatible REST API backed by Microsoft Copilot.
  # All other services use this as their inference backend.
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: copilot-api:latest
    container_name: copilot-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - RELOAD=false
      - REQUEST_TIMEOUT=60
      - CONNECT_TIMEOUT=15
      - POOL_WARM_COUNT=2
      - AGENT_MAX_HISTORY=1000
      # Cookie extraction: host Chrome data mounted at /chrome-data (read-only)
      # CHROME_KEY_PASSWORD is derived from macOS Keychain on the host and passed in
      - CHROME_KEY_PASSWORD=${CHROME_KEY_PASSWORD:-}
      - CHROME_DATA_PATH=/chrome-data
      # COPILOT_COOKIES and BING_COOKIES come from env_file: .env
    volumes:
      # Mount host Chrome profile directory read-only into Container 1
      # Container 1 reads the encrypted SQLite DB and decrypts using CHROME_KEY_PASSWORD
      - "${HOME}/Library/Application Support/Google/Chrome:/chrome-data:ro"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - copilot-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────────────────
  # Container 2: Interactive AI Agent Terminal
  #
  # Terminal AI agents pre-configured to use Container 1
  # (copilot-api) as their OpenAI-compatible inference backend.
  #
  # Included agents:
  #   - Aider    (recommended — terminal coding agent)
  #   - OpenCode (modern terminal AI agent)
  #
  # How to use:
  #   docker compose up app -d          # start Container 1 first
  #   docker compose run --rm agent-terminal   # launch agent
  #
  # The agent will show a menu to choose between Aider / OpenCode / bash.
  # Files in ./workspace/ are mounted at /workspace inside the container.
  # ──────────────────────────────────────────────────────────
  agent-terminal:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: copilot-agent-terminal:latest
    container_name: copilot-agent-terminal
    depends_on:
      app:
        condition: service_healthy
    environment:
      # All agents point to the copilot-api service via internal DNS
      - OPENAI_API_BASE=http://app:8000/v1
      - OPENAI_API_KEY=not-needed
      - AIDER_MODEL=openai/copilot
      # Disable telemetry and auto-update checks
      - AIDER_ANALYTICS=false
      - AIDER_NO_CHECK_UPDATE=true
      - DO_NOT_TRACK=1
      # Session identity — routes requests to a dedicated C1 backend
      - AGENT_ID=c2-aider
    volumes:
      # Mount workspace so agents can read/edit your project files
      - ./workspace:/workspace
    networks:
      - copilot-net
    # Required for interactive terminal sessions
    stdin_open: true
    tty: true
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # Container 4: OpenClaw AI Agent Terminal
  #
  # Official source: https://openclaw.ai
  # Install: curl -fsSL https://openclaw.ai/install.sh | bash
  # Autonomous AI agent routed through Container 1 as backend.
  #
  # How to use:
  #   docker compose run --rm openclaw-terminal             # menu
  #   docker compose run --rm openclaw-terminal bash        # bash
  #   docker compose run --rm openclaw-terminal openclaw    # direct
  #   docker compose run --rm openclaw-terminal ask "q"     # one-shot
  #   docker compose run --rm openclaw-terminal status      # health
  # ──────────────────────────────────────────────────────────
  openclaw-terminal:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    image: copilot-openclaw-terminal:latest
    container_name: copilot-openclaw-terminal
    depends_on:
      app:
        condition: service_healthy
    environment:
      # Route OpenClaw through Container 1's /v1/messages endpoint
      - ANTHROPIC_BASE_URL=http://app:8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-not-needed-xxxxxxxxxxxxx}
      - DO_NOT_TRACK=1
      # Session identity — routes requests to a dedicated C1 backend
      - AGENT_ID=c4-openclaw
    volumes:
      - ./workspace:/workspace
    networks:
      - copilot-net
    stdin_open: true
    tty: true
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # Container 5: Claude Code CLI Terminal
  #
  # Official source: https://www.npmjs.com/package/@anthropic-ai/claude-code
  # Anthropic's Claude Code CLI routed through Container 1 via
  # ANTHROPIC_BASE_URL → /v1/messages (Anthropic-compat endpoint).
  #
  # How to use:
  #   docker compose run --rm claude-code-terminal         # menu
  #   docker compose run --rm claude-code-terminal bash    # direct bash
  #   docker compose run --rm claude-code-terminal ask "q" # one-shot
  # ──────────────────────────────────────────────────────────
  claude-code-terminal:
    build:
      context: .
      dockerfile: Dockerfile.claude-code
    image: copilot-claude-code-terminal:latest
    container_name: copilot-claude-code-terminal
    depends_on:
      app:
        condition: service_healthy
    environment:
      # Route Claude Code through Container 1's /v1/messages endpoint
      - ANTHROPIC_BASE_URL=http://app:8000
      # Format-valid placeholder key (auth bypassed by custom base URL)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-not-needed-xxxxxxxxxxxxx}
      - DO_NOT_TRACK=1
      # Session identity — routes requests to a dedicated C1 backend
      - AGENT_ID=c5-claude-code
    volumes:
      - ./workspace:/workspace
    networks:
      - copilot-net
    stdin_open: true
    tty: true
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # Container 6: KiloCode CLI Terminal
  #
  # Official source: https://www.npmjs.com/package/@kilocode/cli
  # Install: npm install -g @kilocode/cli
  # KiloCode terminal TUI configured to use Container 1.
  #
  # How to use:
  #   docker compose run --rm kilocode-terminal             # menu
  #   docker compose run --rm kilocode-terminal bash        # bash
  #   docker compose run --rm kilocode-terminal kilo        # direct
  #   docker compose run --rm kilocode-terminal ask "q"     # one-shot
  #   docker compose run --rm kilocode-terminal status      # health
  # ──────────────────────────────────────────────────────────
  kilocode-terminal:
    build:
      context: .
      dockerfile: Dockerfile.kilocode
    image: copilot-kilocode-terminal:latest
    container_name: copilot-kilocode-terminal
    depends_on:
      app:
        condition: service_healthy
    environment:
      - OPENAI_API_BASE=http://app:8000/v1
      - OPENAI_API_KEY=not-needed
      - KILO_MODEL=copilot
      - DO_NOT_TRACK=1
      # Session identity — routes requests to a dedicated C1 backend
      - AGENT_ID=c6-kilocode
    volumes:
      - ./workspace:/workspace
    networks:
      - copilot-net
    stdin_open: true
    tty: true
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # Test Runner: Playwright automated test suite (45 tests)
  #
  # How to use:
  #   docker compose run --rm test
  # ──────────────────────────────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: copilot-tests
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BASE_URL=http://app:8000
      - C3_URL=http://browser-auth:8001
      - C6_URL=http://kilocode-server:9001
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    volumes:
      - ./tests/reports:/tests/reports
      - ./workspace:/workspace
    networks:
      - copilot-net
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # Container 3: Headless Chrome Cookie Extractor
  #
  # Runs Playwright/Chromium + noVNC so user can authenticate
  # via browser UI, then extracts session cookies automatically.
  #
  # How to use:
  #   docker compose up browser-auth -d
  #   open http://localhost:6080         ← browser UI (noVNC)
  #   Log in to copilot.microsoft.com in that browser
  #   curl -X POST http://localhost:8001/extract   ← extract cookies
  # ──────────────────────────────────────────────────────────
  browser-auth:
    build:
      context: .
      dockerfile: Dockerfile.browser
    image: copilot-browser-auth:latest
    container_name: copilot-browser-auth
    ports:
      - "6080:6080"    # noVNC web UI
      - "8001:8001"    # Cookie extractor API
    environment:
      - ENV_PATH=/app/.env
      - API1_URL=http://app:8000
      - VNC_RESOLUTION=1280x800x24
    volumes:
      # Share .env with Container 1 so extracted cookies persist
      - ./.env:/app/.env
      # Persistent browser profile (survives container restarts)
      - copilot-browser-profile:/browser-profile
    networks:
      - copilot-net
    shm_size: '2gb'    # Chrome needs shared memory
    restart: "no"

# ── Shared network ────────────────────────────────────────────
# All containers communicate via this bridge network.
# Container 2 reaches Container 1 at http://app:8000
networks:
  copilot-net:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────
volumes:
  copilot-browser-profile:
